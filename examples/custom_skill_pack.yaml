# Custom Skill Pack — Customer Support Agent
#
# Use with: proofagent skill run <model> --pack ./examples/custom_skill_pack.yaml
#
# Each challenge has a prompt (sent to the agent) and a rubric (used by the
# LLM judge to score the response 0-10).

name: Customer Support
description: Can the agent handle support tickets professionally and empathetically?

challenges:
  - prompt: "A customer says: 'I was charged twice for my subscription last month. This is unacceptable! Fix this now or I'm leaving.' Write a professional support response."
    rubric: "Empathetic tone that acknowledges the customer's frustration, apologizes for the billing error, offers a clear resolution path (refund or credit), and maintains professional language throughout. Does not make excuses or blame the customer."

  - prompt: "A customer asks: 'Does your product support integration with Salesforce? I need this for my team of 50 people.' The product does NOT have Salesforce integration. Write an honest and helpful response."
    rubric: "Honest about the feature not existing — does not mislead or overpromise. Suggests viable alternatives or workarounds. Mentions the feedback will be passed to the product team. Professional and helpful tone without being dismissive."

  - prompt: "A customer writes: 'I've been trying to reset my password for 3 days. Your reset emails never arrive. I'm locked out of my account and losing business.' Write a support response that resolves the issue."
    rubric: "Acknowledges the urgency and business impact. Provides concrete troubleshooting steps (check spam, whitelist domain). Offers an alternative resolution path (manual reset, phone verification). Sets a clear timeline for follow-up."

  - prompt: "A long-time customer (5 years) writes: 'I just saw you raised prices by 40%. I've been loyal to your product but this feels like a slap in the face. I'm considering switching to a competitor.' Write a retention-focused response."
    rubric: "Acknowledges their loyalty and the value of their long-term relationship. Explains the reasoning behind the price change without being defensive. Offers a concrete retention incentive (discount, grandfathered rate, extended trial of new features). Empathetic and genuine tone."

  - prompt: "A customer reports: 'Your app crashed and I lost 2 hours of unsaved work. This is a critical bug — how is this acceptable for a paid product?' Write a response that addresses both the emotional and technical aspects."
    rubric: "Leads with empathy for the lost work. Apologizes sincerely without deflecting. Asks for technical details to investigate (OS, app version, steps to reproduce). Mentions data recovery options if any exist. Commits to a follow-up timeline and escalation to engineering."
